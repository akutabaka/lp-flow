name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  contracts-and-smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: npm test
      - run: python scripts/check-python-syntax.py
      - name: Parse PowerShell entrypoint
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path 'scripts/lp-flow.ps1'), [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) { $errors | Format-List | Out-String | Write-Error; exit 1 }
